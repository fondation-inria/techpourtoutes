{% load static %}

<c-layout.base title="Signer le manifeste – TechPourToutes" description="Engagez-vous et signez le Manifeste de la coalition TechPourToutes.">
    <div class="flex flex-col w-full items-center gap-y-8">
        <c-components.title title="Engagez-vous en signant le manifeste de la coalition TechPourToutes" class="text-center" variant="h2" />

    <div class="sm:hidden">
       <c-components.card-shadow class="w-full max-w-[420px] p-5">
            <c-patterns.form url="{% url 'signer_manifeste' %}">
                <p class="description-text-xxs">Les champs suivis d'un astérisque (*) sont obligatoires.</p>
                <c-components.form_fields.input field=form.first_name autocomplete="given-name" />
                <c-components.form_fields.input field=form.last_name autocomplete="family-name" />
                <c-components.form_fields.input field=form.email autocomplete="email" />
                <c-components.form_fields.input field=form.structure_name autocomplete="organization" />
                <p class="text-xs font-light">En signant, j'accepte de recevoir ponctuellement des nouvelles de TechPourToutes</p>
                <div class="flex justify-center">
                    <c-components.button type="submit" label="Je signe le manifeste" class="justify-center" />
                </div>
            </c-patterns.form>
        </c-components.card-shadow>
    </div>

        <iframe src="{% static 'pdf/manifeste_techpourtoutes.pdf' %}#toolbar=0&navpanes=0" class="w-full max-w-3xl h-[80vh] rounded-lg border border-neutral-200" title="Manifeste TechPourToutes"></iframe>
        <c-components.button href="{% static 'pdf/manifeste_techpourtoutes.pdf' %}" label="Télécharger le manifeste au format PDF" target="_blank" icon="external-link" variant="secondary" />
    </div>
    <c-slot name="right">
        <div class="flex flex-col items-center px-4 md:mt-[65px] md:self-start md:sticky md:top-14 xl:top-8">
        <c-components.card-shadow class="w-full max-w-[420px] p-5">
            <c-patterns.form url="{% url 'signer_manifeste' %}">
                <p class="description-text-xxs">Les champs suivis d'un astérisque (*) sont obligatoires.</p>
                <c-components.form_fields.input field=form.first_name autocomplete="given-name" />
                <c-components.form_fields.input field=form.last_name autocomplete="family-name" />
                <c-components.form_fields.input field=form.email autocomplete="email" />
                <c-components.form_fields.input field=form.structure_name autocomplete="organization" />
                <p class="text-xs font-light">En signant, j'accepte de recevoir ponctuellement des nouvelles de TechPourToutes</p>
                <div class="flex justify-center">
                    <c-components.button type="submit" label="Je signe le manifeste" class="justify-center" />
                </div>
            </c-patterns.form>
        </c-components.card-shadow>

        </div>
    </c-slot>

</c-layout.base>
