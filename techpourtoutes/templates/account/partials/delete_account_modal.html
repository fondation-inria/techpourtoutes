<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="w-full max-w-xl rounded-lg bg-white p-4 py-8 shadow-lg border border-primary-700 text-center">
        <h2 class="text-3xl text-primary-700">
            Voulez-vous vraiment supprimer votre compte ?
        </h2>
        <br>
        <p class="mt-2 text-sm text-neutral-950">
            Cette action est irréversible. Pour confirmer, veuillez cocher la case.
        </p>
        <br>
        <c-patterns.form 
            url="{% url 'delete_account' %}"
            hx-post="{% url 'delete_account' %}"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            >
            <c-components.form_fields.checkbox
                field=form.confirm_delete
                full_width=True
                label_class="text-sm"
            />
            <div class="flex flex-col items-center gap-3">
                <c-components.button
                    label="Supprimer définitivement mon compte"
                    variant="primary"
                    type="submit"
                    class="!bg-error-700"
                />
                <c-components.button
                    label="Annuler"
                    type="button"
                    variant="tertiary"
                    size="lg"
                    class="mt-3"
                    hx-on:click="document.getElementById('modal-container').innerHTML = ''"
                />
            </div>
        </c-patterns.form>
    </div>
</div>
