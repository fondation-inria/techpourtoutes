<div id="account-info-card" class="w-full">
    <c-components.card title="Informations personnelles">
        <div class="mt-3"></div>
        <c-patterns.form
            hx-post="{% url 'account_edit' %}"
            hx-target="#account-info-card"
            hx-swap="outerHTML">
            <p class="description-text-xxs">Les champs suivis d'un astérisque (*) sont obligatoires.</p>
            <c-components.form_fields.input field=form.first_name />
            <c-components.form_fields.input field=form.last_name />
            <c-components.form_fields.input field=form.email variant="disabled" />
            <c-components.form_fields.input field=form.phone />
            <c-components.form_fields.input field=form.postal_code />
            <c-components.form_fields.select field=form.professional_situation />
            <c-components.form_fields.input field=form.structure_name />
            <c-components.form_fields.input field=form.job_title />
            <div class="flex justify-end gap-2">
                <c-components.button label="Annuler" variant="secondary" type="button"
                    hx-get="{% url 'account_info' %}"
                    hx-target="#account-info-card"
                    hx-swap="outerHTML" />
                <c-components.button type="submit" label="Sauvegarder" />
            </div>
        </c-patterns.form>
    </c-components.card>
</div>
