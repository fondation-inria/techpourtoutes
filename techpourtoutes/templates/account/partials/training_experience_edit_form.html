<div id="training-experience-{{ experience.pk }}" class="w-full">
    <c-components.card title="Formation">
        <div class="mt-3"></div>
        <c-patterns.form
            hx-post="{% url 'training_experience_edit' experience.pk %}"
            hx-target="#training-experience-{{ experience.pk }}"
            hx-swap="outerHTML">
            <p class="description-text-xxs">Les champs suivis d'un astérisque (*) sont obligatoires.</p>
            <c-components.form_fields.higher_ed_school_search
                id_field=form.higher_ed_school_id
                label_field=form.higher_ed_school_label
                label="Votre établissement*"
                description="Recherchez par nom"
            />
            <c-components.form_fields.input field=form.course />
            <div class="flex justify-end gap-2">
                <c-components.button label="Annuler" variant="secondary" type="button"
                    hx-get="{% url 'training_experience_info' experience.pk %}"
                    hx-target="#training-experience-{{ experience.pk }}"
                    hx-swap="outerHTML" />
                <c-components.button type="submit" label="Sauvegarder" />
            </div>
        </c-patterns.form>
    </c-components.card>
</div>
