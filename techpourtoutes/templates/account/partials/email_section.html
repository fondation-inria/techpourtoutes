<div id="account-email-section">
    <c-components.title title="Adresse mail" variant="intertitre"/>
    <p class="mt-3">Votre adresse mail &nbsp;: <strong>{{ user.email }}</strong></p>
    {% if editing %}
        <c-patterns.form
            class="mt-3"
            hx-post="{% url 'email_change' %}"
            hx-target="#account-email-section"
            hx-swap="outerHTML">
            <c-components.form_fields.input field=form.email description="Format attendu : nom@domaine.fr" />
            <div class="flex justify-end gap-2">
                <c-components.button label="Annuler" variant="secondary" type="button"
                    hx-get="{% url 'account_email' %}"
                    hx-target="#account-email-section"
                    hx-swap="outerHTML"/>
                <c-components.button type="submit" label="Changer d'adresse e-mail"/>
            </div>
        </c-patterns.form>
    {% else %}
        <c-components.button label="Changer mon adresse mail" variant="quaternary"
            hx-get="{% url 'email_change' %}"
            hx-target="#account-email-section"
            hx-swap="outerHTML"/>
    {% endif %}
</div>
