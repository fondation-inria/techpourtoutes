<c-layout.base>
    <c-components.title title="Mon compte" variant="h1" />

    {% if user.jobirl_user_id %}
        <c-components.button href="{% url "login_to_jobirl" %}" label="Accéder à mon espace mentorat" icon="external-link" target="_blank" />
    {% endif %}

    {% include "account/partials/info_card.html" %}

    {% for experience in user.training_experiences.all %}
        {% include "account/partials/training_experience_card.html" %}
    {% endfor %}

    {% include "account/partials/communication_card.html" %}

    <c-patterns.form url="{% url 'logout' %}">
        <c-components.button type="submit" label="Se déconnecter" variant="secondary" />
    </c-patterns.form>
</c-layout.base>
