name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: make lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: techpourtoutes
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql/data
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/techpourtoutes
      ALLOWED_HOSTS: localhost
      # Celery tasks run synchronously in tests (no Redis available in CI).
      # The test conftest also enforces this via an autouse fixture; setting it here
      # is a belt-and-suspenders guarantee that no task ever tries to reach a broker.
      CELERY_TASK_ALWAYS_EAGER: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: make test
