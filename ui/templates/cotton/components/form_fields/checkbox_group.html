<c-vars
    field=field
    label=""
    description=""
    message=""
    :errors=[]
    name=""
    variant="default"
    class=""
/>

<c-components.form-fields.base label=label description=description message=message class=class span_label=True>
    <div class="flex flex-col gap-3">
        {% for opt_value, opt_label in field.field.choices %}
            <label class="inline-flex items-center gap-3 cursor-pointer">
                <span class="inline-flex items-center justify-center">
                    <input
                        type="checkbox"
                        name="{{ field.html_name|default:name }}"
                        value="{{ opt_value }}"
                        {% if opt_value in field.value|default_if_none:"" %}checked{% endif %}
                        {% if variant == "disabled" %}disabled{% endif %}
                        class="peer sr-only"
                    />
                    <span class="tick-base rounded-xs peer-checked:bg-primary-700 {% if variant == "disabled" %}tick-disabled{% elif field.errors or errors or variant == "error" %}tick-error{% elif variant == "valid" %}tick-valid{% else %}tick-default{% endif %}"></span>
                    <c-components.icon name="check" class="absolute h-3 w-3 hidden peer-checked:block text-neutral-50 pointer-events-none" />
                </span>
                <span class="text-sm {% if variant == "disabled" %}text-disabled{% else %}text-neutral-950{% endif %}">{{ opt_label }}</span>
            </label>
        {% endfor %}
    </div>
</c-components.form-fields.base>
