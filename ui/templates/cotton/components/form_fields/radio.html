<c-vars
    field=field
    label=""
    description=""
    message=""
    :errors=[]
    name=""
    id=""
    value=""
    variant="default"
    class=""
/>

<c-components.form-fields.base label=label description=description message=message class=class span_label=True>
    <div role="radiogroup" class="flex flex-wrap gap-3">
        {% for opt_value, opt_label in field.field.choices %}
            <label class="inline-flex items-center gap-3 cursor-pointer">
                <span class="inline-flex items-center justify-center">
                    <input
                        type="radio"
                        name="{{ field.html_name|default:name }}"
                        value="{{ opt_value }}"
                        {% if field.value|stringformat:"s" == opt_value|stringformat:"s" or value == opt_value %}checked{% endif %}
                        {% if variant == "disabled" %}disabled{% endif %}
                        class="peer sr-only"
                    />
                    <span class="tick-base rounded-full {% if variant == "disabled" %}tick-disabled{% elif field.errors or errors or variant == "error" %}tick-error{% elif variant == "valid" %}tick-valid{% else %}tick-default{% endif %}"></span>
                    <span class="absolute h-2.5 w-2.5 rounded-full hidden peer-checked:block bg-primary-700"></span>
                </span>
                <span class="text-sm {% if variant == "disabled" %}text-disabled{% else %}text-neutral-950{% endif %}">{{ opt_label }}</span>
            </label>
        {% endfor %}
    </div>
</c-components.form-fields.base>
