<c-vars
    field=field
    label=""
    description=""
    message=""
    :errors=[]
    id=""
    class=""
    span_label=False
    alpine_label=""
/>

<div class="flex flex-col gap-2 {{ class }}">
    {% if field.label or label %}
        {% if span_label %}
            <span class="label-text-sm" {% if alpine_label %}x-text="{{ alpine_label }}"{% endif %}>{{ field.label|default:label }}</span>
        {% else %}
            <label for="{{ field.id_for_label|default:id }}" class="label-text-sm" {% if alpine_label %}x-text="{{ alpine_label }}"{% endif %}>{{ field.label|default:label }}</label>
        {% endif %}
    {% endif %}
    {% if description %}
        <p class="description-text-xxs">{{ description }}</p>
    {% endif %}

    {{ slot }}

    <c-components.form_fields.messages :field=field :errors=errors :message=message />
</div>
