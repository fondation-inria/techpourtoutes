<c-vars
    label=""
    description=""
    message=""
    :errors=[]
    placeholder=""
    type="text"
    name=""
    id=""
    value=""
    variant="default"
    class=""
/>

<div class="flex flex-col gap-2 {{ class }}">
    {% if label %}
        <label {% if id %}for="{{ id }}"{% endif %} class="text-sm font-light text-neutral-950 leading-[1.4]">{{ label }}</label>
    {% endif %}
    {% if description %}
        <p class="text-xxs text-neutral-700 leading-[1.4] font-light">{{ description }}</p>
    {% endif %}

    <input
        type="{{ type }}"
        id="{{ id }}"
        value="{{ value }}"
        {% if name %}name="{{ name }}"{% endif %}
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if variant == "disabled" %}disabled aria-disabled="true"{% endif %}
        {% if errors or variant == "error" %}aria-invalid="true"{% endif %}
        class="w-full px-3 py-2 text-sm rounded focus:ring {% if variant != "disabled" %}text-neutral-950 bg-neutral-50 shadow-thin-bottom {% endif %}{% if variant == "disabled" %}text-neutral-500 bg-neutral-100 cursor-not-allowed {% elif errors or variant == "error" %}shadow-error-500 focus:ring-error-500 {% elif variant == "valid" %}shadow-success-500 focus:ring-success-500 {% else %}shadow-primary-700 focus:ring-primary-700{% endif %}"
    />

    {% if errors %}
        {% for error in errors %}
            <p class="text-xxs leading-[1.4] text-error-500 font-normal">{{ error }}</p>
        {% endfor %}
    {% elif message %}
        <p class="text-xxs leading-[1.4] text-primary-700 font-normal">{{ message }}</p>
    {% endif %}
</div>
