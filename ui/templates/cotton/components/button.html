<c-vars
    label=""
    href=""
    disabled=False
    type="button"
    base_class="inline-block px-6 py-3 rounded-sm text-sm font-medium leading-[1.4] focus-visible:outline-none focus-visible:border"
    primary_class="bg-primary-700 text-neutral-0 shadow-bottom-and-right shadow-black focus-visible:border-neutral-0 hover:bg-primary-500 active:bg-primary-500 cursor-pointer"
    secondary_class="bg-neutral-0 text-primary-700 shadow-bottom-and-right shadow-primary-700 border border-primary-700 focus-visible:border-neutral-0 hover:border-primary-500 hover:shadow-primary-500 hover:text-primary-500 active:bg-primary-700 active:text-neutral-0 active:border-neutral-0 cursor-pointer"
    tertiary_class="text-neutral-950 text-[11px] hover:bg-primary-50 active:bg-primary-100 focus:outline-primary-500 focus:outline-offset-2"
    quaternary_class="text-primary-700 font-medium focus:outline-primary-500 focus:outline-offset-2"
    disabled_primary_class="bg-neutral-300 text-black cursor-not-allowed select-none shadow-black"
    disabled_secondary_class="bg-neutral-500 text-neutral-0 cursor-not-allowed select-none shadow-black"
    disabled_tertiary_class="text-neutral-500 cursor-not-allowed"
    disabled_quaternary_class="text-primary-700 font-medium cursor-not-allowed"
    icon_class="gap-x-2"
    class=""
    variant=""
    icon=""
/>

    {% if href and not disabled %}
        <a href="{{ href }}"
           class="
            {% if variant == "secondary" %}
                {{ base_class }} {{ secondary_class }}
            {% elif variant == "tertiary" %}
                {{ tertiary_class }}
            {% elif variant == "quaternary" %}
                {{ quaternary_class }}
            {% else %}
                {{ base_class }} {{ primary_class }}
            {% endif %}
            {{ class }}"
            {{ attrs }}
        >
            <div class="flex
                {% if icon %}{{ icon_class }}{% endif %}
                {% if variant != "tertiary" and variant != "quaternary" %}
                    justify-center
                {% endif %}
            ">
                {% if slot %}{{ slot|safe }}{% else %}{{ label|safe }}{% endif %}
                {% if icon %}<c-components.icon name="{{ icon }}" class="w-5 h-5" />{% endif %}
            </div>
        </a>
    {% else %}
        <button type="{{ type }}"
                {% if disabled %}disabled{% endif %}
                class="
                {% if disabled %}
                    {% if variant == "secondary" %}
                        {{ base_class }} {{ disabled_secondary_class }}
                    {% elif variant == "tertiary" %}
                        {{ disabled_tertiary_class }}
                    {% elif variant == "quaternary" %}
                        {{ disabled_quaternary_class }}
                    {% else %}
                        {{ base_class }} {{ disabled_primary_class }}
                    {% endif %}
                {% else %}
                    {% if variant == "secondary" %}
                        {{ base_class }} {{ secondary_class }}
                    {% elif variant == "tertiary" %}
                        {{ tertiary_class }}
                    {% elif variant == "quaternary" %}
                        {{ quaternary_class }}
                    {% else %}
                        {{ base_class }} {{ primary_class }}
                    {% endif %}
                {% endif %}
                {{ class }}"
                {{ attrs }}
        >
        <div class="flex
            {% if icon %}{{ icon_class }}{% endif %}
            {% if variant != "tertiary" and variant != "quaternary" %}
                justify-center
            {% endif %}
        ">
                {% if slot %}{{ slot|safe }}{% else %}{{ label|safe }}{% endif %}
                {% if icon %}<c-components.icon name="{{ icon }}" class="w-5 h-5" />{% endif %}
            </div>
        </button>
    {% endif %}
