<c-vars
    field=field
    label=""
    description=""
    message=""
    :errors=[]
    placeholder=""
    type="text"
    name=""
    id=""
    value=""
    variant="default"
    class=""
/>

<div class="flex flex-col gap-2 {{ class }}">
    {% if field.label or label %}
        <label for="{{ field.id_for_label|default:id }}" class="text-sm font-light text-neutral-950 leading-[1.4]">{{ field.label|default:label }}</label>
    {% endif %}
    {% if description %}
        <p class="text-xxs text-neutral-700 leading-[1.4] font-light">{{ description }}</p>
    {% endif %}

    <input
        type="{{ type }}"
        id="{{ field.id_for_label|default:id }}"
        value="{{ field.value|default:value }}"
        name="{{ field.html_name|default:name }}"
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if variant == "disabled" %}disabled aria-disabled="true"{% endif %}
        {% if field.errors or errors or variant == "error" %}aria-invalid="true"{% endif %}
        class="field-base {% if variant == "disabled" %}field-disabled{% elif field.errors or errors or variant == "error" %}field-error{% elif variant == "valid" %}field-valid{% else %}field-default{% endif %}"
    />

    <c-components.inputs.messages :field=field :errors=errors :message=message />
</div>
