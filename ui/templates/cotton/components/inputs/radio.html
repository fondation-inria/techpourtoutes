<c-vars
    field=field
    label=""
    description=""
    message=""
    :errors=[]
    name=""
    id=""
    value=""
    variant="default"
    class=""
/>

<div class="flex flex-col gap-2 {{ class }}">
    {% if field.label or label %}
        <span class="text-sm font-light text-neutral-950 leading-[1.4]">{{ field.label|default:label }}</span>
    {% endif %}
    {% if description %}
        <p class="text-xxs text-neutral-700 leading-[1.4] font-light">{{ description }}</p>
    {% endif %}

    <div role="radiogroup" class="flex flex-wrap gap-x-8 gap-y-3">
        {% for opt_value, opt_label in field.field.choices %}
            <label class="inline-flex items-center gap-3 cursor-pointer">
                <span class="relative inline-flex items-center justify-center">
                    <input
                        type="radio"
                        name="{{ field.html_name|default:name }}"
                        value="{{ opt_value }}"
                        {% if field.value|stringformat:"s" == opt_value|stringformat:"s" or value == opt_value %}checked{% endif %}
                        {% if variant == "disabled" %}disabled{% endif %}
                        class="peer sr-only"
                    />
                    <span class="tick-base rounded-full {% if variant == "disabled" %}tick-disabled{% elif field.errors or errors or variant == "error" %}tick-error{% elif variant == "valid" %}tick-valid{% else %}tick-default{% endif %}"></span>
                    <span class="absolute h-2.5 w-2.5 rounded-full hidden peer-checked:block {% if variant == "disabled" %}bg-neutral-300{% elif field.errors or errors or variant == "error" %}bg-error-500{% elif variant == "valid" %}bg-success-500{% else %}bg-primary-500{% endif %}"></span>
                </span>
                <span class="text-sm {% if variant == "disabled" %}text-neutral-500{% else %}text-neutral-950{% endif %}">{{ opt_label }}</span>
            </label>
        {% endfor %}
    </div>

    <c-components.inputs.messages :field=field :errors=errors :message=message />
</div>
