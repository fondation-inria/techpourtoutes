<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; }
      .email-cell { padding: 20px 16px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:sans-serif;color:#1a1a2e;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table class="email-container" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;max-width:600px;">
          <tr>
            <td class="email-cell" style="padding:32px 40px 8px;border-bottom:3px solid #e0e7ff;">
              <p style="margin:0;font-size:16px;font-weight:700;letter-spacing:0.05em;color:#4338ca;">TECH POUR TOUTES</p>
            </td>
          </tr>
          <tr>
            <td class="email-cell" style="padding:32px 40px;">
              {{ slot }}
            </td>
          </tr>
          <tr>
            <td class="email-cell" style="padding:16px 40px;background:#f4f4f5;font-size:12px;color:#6b7280;">
              L'équipe Tech Pour Toutes
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
