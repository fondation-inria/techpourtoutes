<!DOCTYPE html>
{% load tailwind_cli static matomo %}
<c-vars title="TechPourToutes" description="" og_image="" />

<html lang="fr" data-theme="techpourtoutes">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        {% if description %}
            <meta name="description" content="{{ description }}">
        {% endif %}

        <meta property="og:title" content="{{ title }}">

        {% if description %}
            <meta property="og:description" content="{{ description }}">
        {% endif %}

        <meta property="og:url" content="{{ request.build_absolute_uri }}">
        <meta property="og:type" content="website">
        <meta property="og:image" content="{% if og_image %}{{ og_image }}{% else %}{{ SITE_URL }}{% static 'images/coalition-tpt-white.png' %}{% endif %}">

        <link rel="canonical" href="{{ request.build_absolute_uri }}">

        {% matomo_tracking %}

        <title>{{ title }}</title>

        <link rel="icon" type="image/png" href="{% static FAVICON_NAMEFILE|add:'.png' %}">

        {% tailwind_css %}

        <script defer src="{% static 'js/alpine.min.js' %}"></script>
        <script defer src="{% static 'js/htmx.min.js' %}"></script>
    </head>

    <body class="min-h-screen font-sans bg-blue-background text-neutral-900">

        <a
            href="{% if exit %}{{ exit }}{% else %}{% url 'coalition_home' %}{% endif %}"
            class="absolute top-3 right-3 md:top-6 md:right-6 z-50 p-2 rounded-full hover:bg-neutral-100 transition"
            aria-label="Fermer"
        >
            <c-components.icon name="close" class="w-6 h-6" />
        </a>

        <div class="flex min-h-screen flex-col">

            {% if messages %}
                <div class="w-full max-w-xl mx-auto px-8 pt-4 flex flex-col gap-y-2">
                    {% for message in messages %}
                        <div
                            x-data="{ show: true }"
                            x-show="show"
                            x-transition.opacity.duration.300ms
                            {% if message.tags == 'success' %}
                                x-init="setTimeout(() => show = false, 5000)"
                            {% endif %}
                            role="alert"
                            class="alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %} flex items-center justify-between"
                        >
                            <span>{{ message }}</span>

                            <button
                                type="button"
                                @click="show = false"
                                class="ml-4 text-xl leading-none cursor-pointer"
                                aria-label="Fermer"
                            >
                                &times;
                            </button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <main class="flex flex-1 items-center justify-center px-4">
                <div class="w-full max-w-xl flex justify-center">
                    {{ slot }}
                </div>
            </main>
            <c-layout.partials.footer />
        </div>
    </body>
</html>
