<!DOCTYPE html>
<c-vars title="TechPourToutes" description="" og_image="" variant="app" right="" exit="" />

<html lang="fr" data-theme="techpourtoutes">
    <c-layout.partials.head title="{{ title }}" description="{{ description }}" og_image="{{ og_image }}" />

    {% if variant == "funnel" %}
        <c-layout.partials.funnel_body exit="{{ exit }}">{{ slot }}</c-layout.partials.funnel_body>
    {% else %}
        <c-layout.partials.base_body right="{{ right }}">{{ slot }}</c-layout.partials.base_body>
    {% endif %}
</html>
