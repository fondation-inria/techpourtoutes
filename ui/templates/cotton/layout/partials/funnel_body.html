<c-vars back="" />
{% load home_url %}
<body class="min-h-screen font-sans bg-blue-background text-neutral-900">
    <a
        href="{% if back %}{{ back }}{% else %}{% home_url %}{% endif %}"
        class="absolute top-3 right-3 md:top-6 md:right-6 z-50 p-2 rounded-full hover:bg-neutral-100 transition"
        aria-label="Fermer"
    >
        <c-components.icon name="close" class="w-6 h-6" />
    </a>
    <div class="flex min-h-screen flex-col">
        <c-layout.partials.messages wrapper_class="w-full max-w-xl mx-auto px-8 pt-4 flex flex-col gap-y-2" />
        <main class="flex flex-1 items-center justify-center px-4">
            <div class="w-full max-w-xl flex justify-center">
                {{ slot }}
            </div>
        </main>
        <c-layout.partials.footer />
    </div>
</body>
