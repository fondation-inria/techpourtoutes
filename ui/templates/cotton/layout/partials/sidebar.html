{% load static %}
<aside class="sticky top-0 shrink-0 h-screen w-[264px] bg-neutral-0 md:border-r-2 md:border-primary-500 md:rounded-r-lg flex flex-col">
    <div class="flex-1 min-h-0 overflow-y-auto p-3">
        <div class="">
            <c-components.brand-mark class="hidden xl:inline" />
        </div>

        <ul class="flex flex-col gap-1 mt-20 xl:mt-10 mb-6">
            <c-components.nav-link href="#" icon="sengager-light" icon-active="sengager-bold" label="S'engager" />
        </ul>

        <c-components.nav-section label="Accompagner individuellement">
            <c-components.nav-link href="{% url "mentor_landing" %}" icon="mentorer-light" icon-active="mentorer-bold" label="Mentorer" />
            <c-components.nav-link href="{% url "internships_landing" %}" icon="accueillir-une-stagiaire-light" icon-active="accueillir-une-stagiaire-bold" label="Accueillir une stagiaire" />
            <c-components.nav-link href="{% url "work_ambassador_landing" %}" icon="pitcher-mon-metier-light" icon-active="pitcher-mon-metier-bold" label="Pitcher mon métier" />
            <c-components.nav-link href="#" icon="pitcher-ma-formation-light" icon-active="pitcher-ma-formation-bold" label="Pitcher ma formation" disabled="true" />
        </c-components.nav-section>

        <c-components.nav-section label="Soutenir la coalition">
            <c-components.nav-link href="{% url "sponsor_landing" %}" icon="devenir-mecene-light" icon-active="devenir-mecene-bold" label="Devenir mécène" />
        </c-components.nav-section>

        <c-components.nav-section label="Motiver mes élèves">
            <c-components.nav-link href="#" icon="organiser-un-atelier-light" icon-active="organiser-un-atelier-bold" label="Organiser un atelier" disabled="true" />
        </c-components.nav-section>
    </div>

    <div class="shrink-0 border-t border-blue-background p-3">
        <ul class="flex flex-col gap-1 mb-5">
        {% if request.user.is_authenticated %}
            <c-components.nav-link href="{% url 'account' %}" label="Mon compte" icon-active="compte" icon="compte" />
        {% else %}
            <div class="flex mt-1">
                <c-components.button href="{% url 'login_request' %}" label="Se connecter" />
            </div>
        {% endif %}
            <c-components.nav-link href="#" label="A propos" />
            <c-components.nav-link href="#" label="Notre manifeste" />
        </ul>
        <div class="flex items-center justify-between px-3">
            <img src="{% static 'svg/rf.svg' %}"
                 alt="République Française"
                 class="h-14 w-auto" />
            <img src="{% static 'svg/france-2030.svg' %}"
                 alt="France 2030 — Lauréat"
                 class="h-14 w-auto" />
        </div>
    </div>
</aside>
